spring:
  application:
    name: backend

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create # 👈 실행될 때마다 테이블을 새로 만듦 (개발/테스트 단계용)
    show-sql: true       # 👈 실행되는 SQL 쿼리를 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # 👈 출력되는 SQL 쿼리를 보기 좋게 정렬
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
